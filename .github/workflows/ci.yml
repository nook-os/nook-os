name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Without a database the suite reports "ok" while executing almost nothing:
    # every test that needs Postgres returns early. NOOK_REQUIRE_DB turns that
    # silent skip into a failure, so a green tick means the tests actually ran.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nook
          POSTGRES_PASSWORD: nook
          POSTGRES_DB: nook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nook"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://nook:nook@localhost:5432/nook
      NOOK_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # A workflow with a bad expression does not fail a job — it fails to parse,
  # so nothing runs and the error only appears when someone pushes a tag and
  # waits. Exactly that happened with a `secrets` reference in a step-level
  # `if`, which is not a context that exists there. actionlint catches it in
  # seconds.
  workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Lint the workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: frontend
        run: pnpm -r typecheck
      - name: Test
        working-directory: frontend
        run: pnpm -r test

  # The Tauri shell is deliberately outside the cargo workspace, so `rust`
  # above cannot see it: `--workspace` excludes it and `fmt --all` walks the
  # same members. That gap shipped a desktop app whose device sign-in could
  # never complete, and CI was green throughout. This is the job that would
  # have caught it.
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend/apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/apps/desktop/src-tauri
      # Tauri links against the system webview; without these the crate does
      # not build at all.
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev
        working-directory: .
      # `generate_context!` reads tauri.conf.json, whose frontendDist points at
      # the built web app. Nothing here runs the UI, but the directory has to
      # exist or the macro fails the build.
      - name: Stub the frontend bundle
        run: mkdir -p frontend/apps/web/dist && touch frontend/apps/web/dist/index.html
        working-directory: .
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  type-gen-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Regenerate types
        run: ./scripts/gen-types.sh
      - name: Committed types must match Rust
        run: git diff --exit-code frontend/packages/api/openapi.json frontend/packages/api/src/generated/schema.d.ts
