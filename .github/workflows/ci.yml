name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Without a database the suite reports "ok" while executing almost nothing:
    # every test that needs Postgres returns early. NOOK_REQUIRE_DB turns that
    # silent skip into a failure, so a green tick means the tests actually ran.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nook
          POSTGRES_PASSWORD: nook
          POSTGRES_DB: nook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nook"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://nook:nook@localhost:5432/nook
      NOOK_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # A workflow with a bad expression does not fail a job — it fails to parse,
  # so nothing runs and the error only appears when someone pushes a tag and
  # waits. Exactly that happened with a `secrets` reference in a step-level
  # `if`, which is not a context that exists there. actionlint catches it in
  # seconds.
  workflows:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Lint the workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: frontend
        run: pnpm -r typecheck
      - name: Test
        working-directory: frontend
        run: pnpm -r test

  # The Tauri shell is deliberately outside the cargo workspace, so `rust`
  # above cannot see it: `--workspace` excludes it and `fmt --all` walks the
  # same members. That gap shipped a desktop app whose device sign-in could
  # never complete, and CI was green throughout. This is the job that would
  # have caught it.
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend/apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/apps/desktop/src-tauri
      # Tauri links against the system webview; without these the crate does
      # not build at all.
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev
        working-directory: .
      # `generate_context!` reads tauri.conf.json, whose frontendDist points at
      # the built web app. Nothing here runs the UI, but the directory has to
      # exist or the macro fails the build.
      - name: Stub the frontend bundle
        run: mkdir -p frontend/apps/web/dist && touch frontend/apps/web/dist/index.html
        working-directory: .
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test

  type-gen-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Regenerate types
        run: ./scripts/gen-types.sh
      - name: Committed types must match Rust
        run: git diff --exit-code frontend/packages/api/openapi.json frontend/packages/api/src/generated/schema.d.ts

  # The Helm chart must lint and render valid, secret-free manifests. Cheap and
  # fast, so it runs on every PR rather than only when charts/ changes.
  helm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      - name: Lint and render the chart
        run: ./charts/nook-control/ci/validate.sh

  # A real (kind) bring-up of the chart on top of the lint/template job above:
  # install against an in-cluster Postgres, assert both Deployments converge and
  # the app answers, exercise `helm upgrade`, then tear down. It builds the
  # images, so it is far heavier than `helm` — hence path-filtered to the chart,
  # its images, and this workflow (plus workflow_dispatch for on-demand runs).
  #
  # AC-2 (MAIN-38) — this job must be safe to make a REQUIRED status check. A
  # required check that never runs blocks a PR forever, so the job runs
  # UNCONDITIONALLY (no job-level `if`) and gates only its heavy steps: on a PR
  # that touches no chart files every heavy step skips and the job is a fast
  # success (the explicit skip note below), so `chart-e2e` reports green on
  # EVERY PR — chart PRs run the deploy, non-chart PRs are not blocked.
  chart-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Read access to the org's published container images, so the e2e can pull
    # them rather than compile the control plane in-job (a full Rust build on a
    # 2-CPU runner starved the kind node and Postgres never became Ready).
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            charts:
              - 'charts/**'
              - 'deploy/docker/**'
              - 'scripts/k8s-e2e.sh'
              - '.github/workflows/ci.yml'
      # The fast-success path: no chart-affecting files changed, so the deploy
      # test is intentionally skipped and this required check reports green.
      - name: No chart changes — skip the deploy test
        if: steps.changes.outputs.charts != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          echo "No changes under charts/, deploy/docker/, scripts/k8s-e2e.sh or the CI workflow."
          echo "Skipping the kind deploy test; this required check reports success."
      - name: Set up Helm
        if: steps.changes.outputs.charts == 'true' || github.event_name == 'workflow_dispatch'
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      # Install the kind binary only; the e2e script owns the cluster lifecycle
      # (create, assert, delete) so it can be idempotent and self-cleaning.
      - name: Set up kind
        if: steps.changes.outputs.charts == 'true' || github.event_name == 'workflow_dispatch'
        uses: helm/kind-action@v1
        with:
          install_only: true
      # Pull the published images (private packages need this login; public ones
      # ignore it). The e2e retags them as its two upgrade tags — no in-job compile.
      - name: Log in to ghcr
        if: steps.changes.outputs.charts == 'true' || github.event_name == 'workflow_dispatch'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Chart end-to-end on kind
        if: steps.changes.outputs.charts == 'true' || github.event_name == 'workflow_dispatch'
        run: ./scripts/k8s-e2e.sh --pull
