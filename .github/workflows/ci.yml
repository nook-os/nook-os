name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    # Without a database the suite reports "ok" while executing almost nothing:
    # every test that needs Postgres returns early. NOOK_REQUIRE_DB turns that
    # silent skip into a failure, so a green tick means the tests actually ran.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nook
          POSTGRES_PASSWORD: nook
          POSTGRES_DB: nook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nook"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://nook:nook@localhost:5432/nook
      NOOK_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace

  # A workflow with a bad expression does not fail a job — it fails to parse,
  # so nothing runs and the error only appears when someone pushes a tag and
  # waits. Exactly that happened with a `secrets` reference in a step-level
  # `if`, which is not a context that exists there. actionlint catches it in
  # seconds.
  workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint the workflows
        uses: docker://rhysd/actionlint:latest
        with:
          # The two remaining SC2046 warnings are deliberate word-splitting:
          # one passes several image digests as separate arguments, the other
          # builds a filename. Neither involves a path that can contain spaces.
          args: -color -ignore 'SC2046'

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: frontend
        run: pnpm -r typecheck

  type-gen-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Regenerate types
        run: ./scripts/gen-types.sh
      - name: Committed types must match Rust
        run: git diff --exit-code frontend/packages/api/openapi.json frontend/packages/api/src/generated/schema.d.ts
