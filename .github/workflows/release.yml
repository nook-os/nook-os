name: Release

# Tagging is the whole trigger: `git tag v0.2.0 && git push --tags` publishes
# binaries and container images that all carry the same version. Nothing here
# runs on a branch push, so main never produces something that looks released.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true

permissions:
  contents: write # create the release and upload assets
  packages: write # push to ghcr.io

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------- binaries
  #
  # Built natively wherever a runner of that architecture exists — cross
  # toolchains on Linux are the usual source of "builds fine, segfaults on the
  # target", and GitHub gives us arm64 Linux for free. macOS is the exception
  # noted below.
  #
  # Ubuntu 22.04 deliberately, not latest: the binary links against the glibc
  # it was built on, and 24.04's is too new for Debian 12 — the distro most
  # self-hosters are actually running.
  binaries:
    name: nook (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: nook-linux-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: nook-linux-aarch64
          # Both macOS targets build on Apple silicon. macos-13 (Intel) is
          # being retired, and unlike Linux, cross-targeting on macOS is
          # routine — Xcode ships both SDKs, so this is a supported build
          # rather than a cross-toolchain gamble.
          - runner: macos-14
            target: x86_64-apple-darwin
            asset: nook-darwin-x86_64
            native: false
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: nook-darwin-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        # nook-control too: the installer's "systemd, native binary" mode runs
        # the control plane on the host rather than in a container, and it has
        # to come from somewhere.
        run: |
          cargo build --release --locked -p nook-node --target ${{ matrix.target }}
          cargo build --release --locked -p nook-control --target ${{ matrix.target }}

      # A binary that cannot run is worth catching here rather than in
      # someone's install script.
      # Only where the runner can actually execute what it built.
      #
      # `--version` is not enough. rustls picks its crypto provider from
      # whichever features are enabled, and `-p nook-node` resolves those
      # differently from a workspace build — so a binary that passes every test
      # can still panic the first time it constructs a TLS config, which is the
      # first time the agent connects. Nothing but a release-shaped binary can
      # show that, so force it to build one here.
      - name: It runs, and can build a TLS config
        if: matrix.native != false
        run: |
          BIN=./target/${{ matrix.target }}/release/nook
          $BIN --version
          # Unreachable on purpose: we want the TLS setup, not a connection.
          out=$($BIN enroll --server https://127.0.0.1:1 --token smoke \
                  --server-fingerprint 00 2>&1 || true)
          echo "$out"
          case "$out" in
            *panicked*) echo "::error::building a TLS config panicked"; exit 1 ;;
          esac

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nook dist/${{ matrix.asset }}
          cp target/${{ matrix.target }}/release/nook-control \
             dist/$(echo '${{ matrix.asset }}' | sed 's/^nook-/nook-control-/')
          cd dist
          # Checksums travel with the binaries so the install script can verify
          # what it downloaded instead of trusting the transport alone.
          for f in nook-*; do
            case "$f" in *.sha256) continue ;; esac
            shasum -a 256 "$f" > "$f.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.asset }}
          path: dist/*
          retention-days: 1

  # -------------------------------------------------------------- containers
  #
  # Each architecture builds on its own native runner and pushes by digest;
  # the merge job below stitches them into one multi-arch tag. The obvious
  # alternative — buildx with QEMU — emulates the whole Rust compile and turns
  # a five-minute build into forty.
  images:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # An `include:` whose keys all match an existing axis fills in extra
        # fields on the matching combinations — which is how `runner` and
        # `dockerfile` attach here without inventing standalone jobs.
        image: [control, node, web]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
          - image: control
            dockerfile: deploy/docker/control.Dockerfile
          - image: node
            dockerfile: deploy/docker/node.Dockerfile
          - image: web
            dockerfile: deploy/docker/web-prod.Dockerfile
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/nook-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # Leave the digest as a filename for the merge job to pick up. The
      # `sha256:` prefix is stripped here so the merge can rebuild the
      # reference without parsing anything.
      - name: Record the digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    name: Multi-arch manifest
    needs: images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [control, node, web]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create the manifest
        working-directory: /tmp/digests
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/nook-${{ matrix.image }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          docker buildx imagetools create \
            -t "$REPO:$VERSION" -t "$REPO:latest" \
            $(printf "${REPO}@sha256:%s " $(ls))
          docker buildx imagetools inspect "$REPO:$VERSION"

  # ---------------------------------------------------------------- release
  release:
    needs: [binaries, merge]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true
      # The installer ships as an asset too, so `curl` has a stable URL that
      # does not depend on a control plane already existing.
      - name: Include the installer
        run: cp install/install.sh dist/install.sh
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
