name: Release

# Tagging is the whole trigger: `git tag v0.2.0 && git push --tags` publishes
# binaries and container images that all carry the same version. Nothing here
# runs on a branch push, so main never produces something that looks released.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist)"
        required: true

permissions:
  contents: write # create the release and upload assets
  packages: write # push to ghcr.io

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------- binaries
  #
  # Built natively wherever a runner of that architecture exists — cross
  # toolchains on Linux are the usual source of "builds fine, segfaults on the
  # target", and GitHub gives us arm64 Linux for free. macOS is the exception
  # noted below.
  #
  # Ubuntu 22.04 deliberately, not latest: the binary links against the glibc
  # it was built on, and 24.04's is too new for Debian 12 — the distro most
  # self-hosters are actually running.
  binaries:
    name: nook (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: nook-linux-x86_64
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: nook-linux-aarch64
          # Both macOS targets build on Apple silicon. macos-13 (Intel) is
          # being retired, and unlike Linux, cross-targeting on macOS is
          # routine — Xcode ships both SDKs, so this is a supported build
          # rather than a cross-toolchain gamble.
          - runner: macos-14
            target: x86_64-apple-darwin
            asset: nook-darwin-x86_64
            native: false
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: nook-darwin-aarch64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        # nook-control too: the installer's "systemd, native binary" mode runs
        # the control plane on the host rather than in a container, and it has
        # to come from somewhere.
        run: |
          cargo build --release --locked -p nook-node --target ${{ matrix.target }}
          cargo build --release --locked -p nook-control --target ${{ matrix.target }}

      # A binary that cannot run is worth catching here rather than in
      # someone's install script.
      # Only where the runner can actually execute what it built.
      #
      # `--version` is not enough. rustls picks its crypto provider from
      # whichever features are enabled, and `-p nook-node` resolves those
      # differently from a workspace build — so a binary that passes every test
      # can still panic the first time it constructs a TLS config, which is the
      # first time the agent connects. Nothing but a release-shaped binary can
      # show that, so force it to build one here.
      - name: It runs, and can build a TLS config
        if: matrix.native != false
        run: |
          BIN=./target/${{ matrix.target }}/release/nook
          $BIN --version
          # Unreachable on purpose: we want the TLS setup, not a connection.
          out=$($BIN enroll --server https://127.0.0.1:1 --token smoke \
                  --server-fingerprint 00 2>&1 || true)
          echo "$out"
          case "$out" in
            *panicked*) echo "::error::building a TLS config panicked"; exit 1 ;;
          esac

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nook dist/${{ matrix.asset }}
          control_asset="$(echo '${{ matrix.asset }}' | sed 's/^nook-/nook-control-/')"
          cp "target/${{ matrix.target }}/release/nook-control" "dist/$control_asset"
          cd dist
          # Checksums travel with the binaries so the install script can verify
          # what it downloaded instead of trusting the transport alone.
          for f in nook-*; do
            case "$f" in *.sha256) continue ;; esac
            shasum -a 256 "$f" > "$f.sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.asset }}
          path: dist/*
          retention-days: 1


  # ---------------------------------------------------------------- desktop
  #
  # The Tauri shell, which is the same web UI in a native window rather than a
  # separate product. Its own job because it needs a system webview and, on
  # Linux, a pile of GTK development packages that nothing else here wants.
  #
  # Not cross-compiled and not emulated: a desktop bundle is signed and linked
  # against the platform it runs on, so each one is built on that platform.
  desktop:
    name: desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            label: linux-x86_64
          - runner: macos-14
            label: macos-aarch64
          # macos-13 (Intel) is being retired and its queue never drains, so
          # the Intel bundle is cross-targeted from Apple silicon — routine on
          # macOS, where Xcode ships both SDKs.
          - runner: macos-14
            label: macos-x86_64
            target: x86_64-apple-darwin
          - runner: windows-latest
            label: windows-x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    env:
      # `secrets` is not a context a step-level `if` can read, but a job-level
      # `env` can — so the presence check is hoisted here and the step tests a
      # plain string. Without this the workflow fails to parse at all.
      HAS_NOTARY_KEY: ${{ secrets.APPLE_API_KEY_P8 != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/apps/desktop/src-tauri
          key: desktop-${{ matrix.label }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # webkit2gtk is the webview; the rest are what its bundler links against.
      - name: Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev

      # The bundle carries a version of its own, and nothing keeps it in step
      # with the tag — it sat at 0.1.0 while the workspace was at 0.2.3. Take
      # it from the tag so "which build is this?" has one answer.
      - name: Stamp the version from the tag
        shell: bash
        run: |
          v="${{ inputs.tag || github.ref_name }}"
          v="${v#v}"
          f=frontend/apps/desktop/src-tauri/tauri.conf.json
          node -e "
            const fs=require('fs'), p='$f';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version='$v';
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
            console.log('desktop version ->', j.version);
          "

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Add the cross target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      # notarytool wants the App Store Connect key as a file. Written outside
      # the workspace so no build step can sweep it into an artifact, and the
      # runner is destroyed afterwards.
      #
      # All three notarisation variables are exported HERE rather than in the
      # build step's `env:` block, and that placement is the point: a missing
      # secret becomes an empty string, and an empty string is still a variable
      # that exists. Tauri saw APPLE_API_ISSUER set, tried to notarise with it,
      # and failed with "The value '' is invalid for '--issuer'". Setting them
      # through GITHUB_ENV only when the key exists means they are genuinely
      # absent otherwise, which is what makes Tauri sign and stop there.
      - name: Stage the notarisation credentials
        if: runner.os == 'macOS' && env.HAS_NOTARY_KEY == 'true'
        env:
          KEY: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$KEY" > "$path"
          chmod 600 "$path"
          {
            echo "APPLE_API_KEY_PATH=$path"
            echo "APPLE_API_KEY=${{ secrets.APPLE_API_KEY }}"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
          } >> "$GITHUB_ENV"

      - name: Build the bundle
        working-directory: frontend/apps/desktop
        env:
          # macOS signing. Tauri imports the certificate into a temporary
          # keychain itself, so the private key never lands on disk in the
          # workspace. Absent on other platforms, where these are ignored.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri's own update signature. Separate from notarisation, which says
          # Apple scanned the build but nothing about who published the update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          # Notarisation variables are deliberately NOT set here — the staging
          # step above exports them through GITHUB_ENV, and only when the key
          # exists. Listing them here sets them to the empty string when the
          # secret is missing, and an empty string is still a variable that
          # exists: Tauri reads it, tries to notarise, and fails with
          # "The value '' is invalid for '--issuer'".
        run: pnpm tauri build ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      # Bundle names and layout differ per platform, so collect by extension —
      # but ONLY from under a `bundle/` directory. Searching all of `target/`
      # for `*.exe` swept up every Rust build script on Windows and attached
      # forty of them to a release, next to the unpackaged binary.
      #
      # The `bundle/` scoping is what makes `*.exe` safe to keep: the NSIS
      # setup lives there and is a real installer people prefer, while the bare
      # nookos_desktop.exe and every build script sit outside it.
      - name: Collect
        shell: bash
        run: |
          mkdir -p desktop-dist
          root=frontend/apps/desktop/src-tauri/target
          # `control.tar.gz` and `data.tar.gz` are the INSIDES of a .deb — an ar
          # archive containing exactly those two members, which the deb bundler
          # leaves unpacked under `bundle/`. They are not artifacts. Sweeping
          # them up published deb innards as release assets, and worse, one of
          # them won the `.tar.gz` alias and shipped as `NookOS-<label>.tar.gz`
          # — a "download" that is a fragment of a package.
          find "$root" -type f -path '*/bundle/*' \
            ! -name 'control.tar.gz' ! -name 'data.tar.gz' \
            \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
               -o -name '*.rpm' -o -name '*.msi' -o -name '*.exe' \
               -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.sig' \) \
            -exec cp {} desktop-dist/ \;
          # An empty bundle directory means the build silently produced nothing,
          # which would otherwise surface as a release missing its downloads.
          [ -n "$(ls -A desktop-dist)" ] || { echo "::error::no bundle produced"; exit 1; }

          # Version-less copies, so a download link can be written once and
          # keep working. `releases/latest/download/<name>` resolves by exact
          # filename, so a name carrying the version breaks every link the
          # moment a release ships — which is why the CLI binaries have always
          # been called `nook-linux-x86_64` rather than `nook-0.3.6-linux`.
          #
          # A `.sig` is named after the artifact it signs, NOT collapsed to one
          # name per platform. It used to be: every signature became
          # `NookOS-<label>.sig` and the last one written won, so on Linux the
          # deb's signature ended up paired with the AppImage in latest.json and
          # on Windows the msi's with the setup.exe. Both fail verification on
          # the user's machine, silently, at update time. macOS was correct only
          # because it produces exactly one signed artifact.
          for f in desktop-dist/*; do
            case "$f" in *NookOS-${{ matrix.label }}*) continue ;; esac
            base="$f"; sig=""
            case "$f" in *.sig) base="${f%.sig}"; sig=".sig" ;; esac
            case "$base" in
              *-setup.exe) ext="-setup.exe" ;;
              *.tar.gz)    ext=".tar.gz" ;;
              *)           ext=".${base##*.}" ;;
            esac
            alias="desktop-dist/NookOS-${{ matrix.label }}${ext}${sig}"
            # Two different files claiming one alias is the bug above. Fail
            # loudly rather than let the last one win.
            if [ -e "$alias" ]; then
              echo "::error::$alias would be written twice (from $f) — two artifacts are collapsing to one name"
              exit 1
            fi
            cp "$f" "$alias"
          done
          ls -la desktop-dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: desktop-dist/*
          retention-days: 1

  # -------------------------------------------------------------- containers
  #
  # Each architecture builds on its own native runner and pushes by digest;
  # the merge job below stitches them into one multi-arch tag. The obvious
  # alternative — buildx with QEMU — emulates the whole Rust compile and turns
  # a five-minute build into forty.
  images:
    name: ${{ matrix.image }} (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        # An `include:` whose keys all match an existing axis fills in extra
        # fields on the matching combinations — which is how `runner` and
        # `dockerfile` attach here without inventing standalone jobs.
        image: [control, node, web]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm
          - image: control
            dockerfile: deploy/docker/control.Dockerfile
          - image: node
            dockerfile: deploy/docker/node.Dockerfile
          - image: web
            dockerfile: deploy/docker/web-prod.Dockerfile
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository_owner }}/nook-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # Leave the digest as a filename for the merge job to pick up. The
      # `sha256:` prefix is stripped here so the merge can rebuild the
      # reference without parsing anything.
      - name: Record the digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    name: Multi-arch manifest
    needs: images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        image: [control, node, web]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create the manifest
        working-directory: /tmp/digests
        env:
          REPO: ${{ env.REGISTRY }}/${{ github.repository_owner }}/nook-${{ matrix.image }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          # Word splitting is the point here: every digest has to arrive as a
          # separate argument. The filenames are hex digests, so there is
          # nothing to split on but the spaces we put there.
          #
          # Three tags: the full tag (`v0.4.10`), the bare semver (`0.4.10`),
          # and `latest`. The bare semver is what the Helm chart's appVersion
          # resolves to — its default image tag has no `v` — so a chart
          # installed with no override pulls exactly this release's images.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            -t "$REPO:$VERSION" -t "$REPO:${VERSION#v}" -t "$REPO:latest" \
            $(printf "${REPO}@sha256:%s " $(ls))
          docker buildx imagetools inspect "$REPO:$VERSION"

  # ------------------------------------------------------------- helm chart
  #
  # Publish the chart as an OCI artifact next to the images, versioned from the
  # same tag so `helm install … --version X.Y.Z` pulls a chart whose default
  # images ARE that release. Gated on the chart's own lint/template checks
  # (ci/validate.sh) — a tag that fails chart validation publishes no chart.
  # Idempotent: re-running overwrites the same OCI tag. Runs after `merge` so a
  # chart is never advertised for a release whose images failed to build.
  chart:
    needs: [merge]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      # AC-4 gate: the same lint + render the CI `helm` job runs. A failure here
      # fails the job before anything is packaged or pushed.
      - name: Validate the chart
        run: ./charts/nook-control/ci/validate.sh
      # AC-2/AC-3: stamp BOTH version and appVersion to the release version
      # (without the `v`), so the chart version equals the image tags its
      # defaults deploy — no manual bump that can drift.
      - name: Stamp the chart version from the tag
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          ver="${TAG#v}"
          sed -i "s/^version:.*/version: ${ver}/" charts/nook-control/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${ver}\"/" charts/nook-control/Chart.yaml
          grep -E '^(version|appVersion):' charts/nook-control/Chart.yaml
      - name: Log in to ghcr for Helm
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$TOKEN" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
      - name: Package and push the chart
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          ver="${TAG#v}"
          helm package charts/nook-control --destination /tmp/chart
          # Pushes to oci://ghcr.io/<owner>/charts/nook-control:<ver> — the chart
          # name becomes the final path segment.
          helm push "/tmp/chart/nook-control-${ver}.tgz" \
            "oci://${REGISTRY}/${{ github.repository_owner }}/charts"

  # ---------------------------------------------------------------- release
  release:
    needs: [binaries, desktop, merge]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist
          merge-multiple: true
      # The installer ships as an asset too, so `curl` has a stable URL that
      # does not depend on a control plane already existing.
      - name: Include the installer
        run: cp install/install.sh dist/install.sh

      # The manifest the desktop app polls. Built from the .sig files Tauri
      # produced beside each bundle — the signature is what makes an update
      # trustworthy, so a platform whose .sig is missing is LEFT OUT rather
      # than published unsigned.
      - name: Build the update manifest
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          version = os.environ["VERSION"].lstrip("v")
          base = f"https://github.com/${{ github.repository }}/releases/download/{os.environ['VERSION']}"
          dist = pathlib.Path("dist")

          # Tauri's platform keys, and the bundle each one updates from. The
          # signature is `<artifact>.sig` — derived, not listed, so it cannot
          # drift from the artifact the way a second column could.
          wanted = {
              "darwin-aarch64": "NookOS-macos-aarch64.tar.gz",
              "darwin-x86_64":  "NookOS-macos-x86_64.tar.gz",
              "linux-x86_64":   "NookOS-linux-x86_64.AppImage",
              "windows-x86_64": "NookOS-windows-x86_64-setup.exe",
          }
          platforms = {}
          for key, name in wanted.items():
              sig = dist / f"{name}.sig"
              if not (dist / name).exists() or not sig.exists():
                  print(f"skip {key}: no signed {name}")
                  continue

              # minisign records what it signed in the trusted comment. Pairing
              # a signature with the wrong file is the exact bug this replaced,
              # and it is invisible until somebody's update fails, so check it
              # here where it costs nothing.
              try:
                  import base64 as _b64
                  comment = _b64.b64decode(sig.read_text()).decode()
                  signed = [l for l in comment.splitlines() if "file:" in l]
                  if signed and "file:" in signed[0]:
                      signed_name = signed[0].split("file:")[1].strip()
                      # The alias is a renamed copy, so compare suffixes rather
                      # than names: `NookOS.app.tar.gz` aliases to
                      # `NookOS-macos-aarch64.tar.gz`.
                      ok = signed_name.endswith(name.split(".", 1)[-1]) or \
                           name.endswith(signed_name.split(".", 1)[-1])
                      if not ok:
                          print(f"::error::{key}: signature is over {signed_name}, not {name}")
                          raise SystemExit(1)
                      print(f"{key}: signature verified over {signed_name}")
              except SystemExit:
                  raise
              except Exception as e:  # noqa: BLE001 - a check, not the build
                  print(f"::warning::{key}: could not read the signature comment ({e})")
              platforms[key] = {
                  "signature": sig.read_text().strip(),
                  "url": f"{base}/{name}",
              }

          if not platforms:
              # Not fatal: the release is still good, the app simply will not
              # self-update from it. Saying so beats a manifest promising
              # nothing.
              print("::warning::no signed update artifacts — publishing no manifest")
              raise SystemExit(0)

          (dist / "latest.json").write_text(json.dumps({
              "version": version,
              "notes": f"NookOS {os.environ['VERSION']}",
              "platforms": platforms,
          }, indent=2))
          print("manifest covers:", ", ".join(platforms))
          PY
      # AC-5: advertise the published chart coordinates and a one-line install in
      # every release, so a new release surfaces the Kubernetes path.
      - name: Chart coordinates for the notes
        id: chart
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ### Kubernetes (Helm)

            The chart is published to ghcr as an OCI artifact, versioned in
            lockstep with the images above:

            ```bash
            helm install nook oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/nook-control \
              --version ${{ steps.chart.outputs.version }} \
              --set existingSecret=nook-control-secrets \
              --set ingress.host=nook.example.com \
              --set config.publicBaseUrl=https://nook.example.com
            ```

            See [`docs/ci-deploy.md`](https://github.com/${{ github.repository }}/blob/${{ inputs.tag || github.ref_name }}/docs/ci-deploy.md) for the full values.
