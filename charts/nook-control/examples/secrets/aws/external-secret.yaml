# Materialize the chart's Kubernetes Secret from AWS Secrets Manager.
#
# `target.name` (nook-control-secrets) is identical to the Vault and GCP
# examples, so the chart install command is unchanged across backends.
#
# Assumes ONE Secrets Manager secret holding a JSON document — the idiomatic AWS
# shape — with the fields the `property` selectors below reference:
#   aws secretsmanager create-secret --name nookos/control-plane \
#     --secret-string '{
#       "database_url":"postgres://user:pass@db.example:5432/nook",
#       "session_secret":"REPLACE_WITH_32+_CHAR_RANDOM"
#     }'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nook-control-secrets
  namespace: NOOK_NAMESPACE
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: nook-aws
    kind: SecretStore
  target:
    name: nook-control-secrets # ── the chart's existingSecret ──
    creationPolicy: Owner
  data:
    # Required. `key` is the Secrets Manager secret name/ARN; `property` selects
    # a field from its JSON document.
    - secretKey: DATABASE_URL
      remoteRef:
        key: "nookos/control-plane"
        property: "database_url"
    - secretKey: SESSION_SECRET
      remoteRef:
        key: "nookos/control-plane"
        property: "session_secret"
    # Optional — delete any block whose feature you do not use.
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: "nookos/control-plane"
        property: "oidc_client_secret"
    - secretKey: NOOK_S3_ACCESS_KEY_ID
      remoteRef:
        key: "nookos/control-plane"
        property: "s3_access_key_id"
    - secretKey: NOOK_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: "nookos/control-plane"
        property: "s3_secret_access_key"
    # NookOS's own at-rest secret encryption key (SECRETS_KEY, 64 hex).
    - secretKey: SECRETS_KEY
      remoteRef:
        key: "nookos/control-plane"
        property: "secrets_key"
