# AWS Secrets Manager as an External Secrets Operator (ESO) source.
#
# ESO reads AWS Secrets Manager and writes a plain Kubernetes Secret; the chart
# consumes only that Secret. NookOS has no AWS SDK and never calls AWS.
#
# Prerequisites (yours — NG-2, not automated here):
#   - the External Secrets Operator installed in the cluster
#   - IRSA configured: the Kubernetes ServiceAccount below is annotated with an
#     IAM role allowing secretsmanager:GetSecretValue on the secret used
#   - the secret created in Secrets Manager (see external-secret.yaml)
#
# Replace every ALL-CAPS placeholder. Values here are placeholders only (AC-4).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: nook-aws
  namespace: NOOK_NAMESPACE
spec:
  provider:
    aws:
      service: SecretsManager
      region: "AWS_REGION" # e.g. us-east-1
      auth:
        # IRSA — the pod's ServiceAccount assumes an IAM role via its projected
        # token. No static access key lives in the cluster.
        jwt:
          serviceAccountRef:
            name: "external-secrets" # SA annotated with the IAM role (adjust)
