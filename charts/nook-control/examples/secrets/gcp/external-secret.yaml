# Materialize the chart's Kubernetes Secret from Google Secret Manager.
#
# `target.name` (nook-control-secrets) is identical to the Vault and AWS
# examples, so the chart install command is unchanged across backends — only the
# source (this file + its SecretStore) differs.
#
# Assumes one Secret Manager secret per value, named nookos-<key>:
#   gcloud secrets create nookos-database-url  --replication-policy=automatic
#   printf 'postgres://user:pass@db:5432/nook' | \
#     gcloud secrets versions add nookos-database-url --data-file=-
#   gcloud secrets create nookos-session-secret --replication-policy=automatic
#   openssl rand -hex 32 | tr -d '\n' | \
#     gcloud secrets versions add nookos-session-secret --data-file=-
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nook-control-secrets
  namespace: NOOK_NAMESPACE
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: nook-gcp
    kind: SecretStore
  target:
    name: nook-control-secrets # ── the chart's existingSecret ──
    creationPolicy: Owner
  data:
    # Required.
    - secretKey: DATABASE_URL
      remoteRef:
        key: "nookos-database-url" # the Secret Manager secret id
        version: "latest"
    - secretKey: SESSION_SECRET
      remoteRef:
        key: "nookos-session-secret"
        version: "latest"
    # Optional — delete any block whose feature you do not use.
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: "nookos-oidc-client-secret"
        version: "latest"
    - secretKey: NOOK_S3_ACCESS_KEY_ID
      remoteRef:
        key: "nookos-s3-access-key-id"
        version: "latest"
    - secretKey: NOOK_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: "nookos-s3-secret-access-key"
        version: "latest"
    # NookOS's own at-rest secret encryption key (SECRETS_KEY, 64 hex).
    - secretKey: SECRETS_KEY
      remoteRef:
        key: "nookos-secrets-key"
        version: "latest"
