# Google Secret Manager as an External Secrets Operator (ESO) source.
#
# ESO reads Google Secret Manager and writes a plain Kubernetes Secret; the
# chart consumes only that Secret. NookOS has no GCP SDK and never calls Google.
#
# Prerequisites (yours — NG-2, not automated here):
#   - the External Secrets Operator installed in the cluster
#   - Workload Identity configured: the Kubernetes ServiceAccount below is bound
#     to a Google service account with roles/secretmanager.secretAccessor
#   - the secrets created in Secret Manager (see external-secret.yaml)
#
# Replace every ALL-CAPS placeholder. Values here are placeholders only (AC-4).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: nook-gcp
  namespace: NOOK_NAMESPACE
spec:
  provider:
    gcpsm:
      projectID: "GCP_PROJECT_ID"
      auth:
        # Workload Identity — the GCP equivalent of AWS IRSA. No static key: the
        # KSA below impersonates a GSA with secretAccessor. Alternatively use
        # `secretRef` with a mounted SA key, but Workload Identity is preferred.
        workloadIdentity:
          clusterLocation: "GCP_REGION" # e.g. us-central1
          clusterName: "GKE_CLUSTER_NAME"
          serviceAccountRef:
            name: "external-secrets" # KSA bound to the GSA (adjust to yours)
