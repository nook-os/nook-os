# Materialize the Kubernetes Secret the chart references, from Vault.
#
# `target.name` is EXACTLY what you pass to the chart:
#   helm install nook charts/nook-control --set existingSecret=nook-control-secrets ...
# The same target name is used in the GCP and AWS examples, so the install
# command is identical across backends — only this file's source differs.
#
# Assumes a KV v2 secret at  secret/nookos/control-plane  with fields:
#   database_url, session_secret, and (optionally) oidc_client_secret,
#   s3_access_key_id, s3_secret_access_key, secrets_key.
# Create it with, e.g.:
#   vault kv put secret/nookos/control-plane \
#     database_url='postgres://user:pass@db.EXAMPLE:5432/nook' \
#     session_secret='REPLACE_WITH_32+_CHAR_RANDOM'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nook-control-secrets
  namespace: NOOK_NAMESPACE
spec:
  refreshInterval: "1h" # re-read Vault this often; ESO updates the Secret in place
  secretStoreRef:
    name: nook-vault
    kind: SecretStore
  target:
    # ── This is the chart's existingSecret. ──────────────────────────────────
    name: nook-control-secrets
    creationPolicy: Owner # ESO creates and owns the Secret
  data:
    # Required.
    - secretKey: DATABASE_URL
      remoteRef:
        key: "nookos/control-plane" # path under the store's KV v2 mount
        property: "database_url" # field within that secret
    - secretKey: SESSION_SECRET
      remoteRef:
        key: "nookos/control-plane"
        property: "session_secret"
    # Optional — delete any block whose feature you do not use.
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: "nookos/control-plane"
        property: "oidc_client_secret"
    - secretKey: NOOK_S3_ACCESS_KEY_ID
      remoteRef:
        key: "nookos/control-plane"
        property: "s3_access_key_id"
    - secretKey: NOOK_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: "nookos/control-plane"
        property: "s3_secret_access_key"
    # The vault key for NookOS's OWN at-rest secret encryption (SECRETS_KEY,
    # 64 hex). Recommended in production; see docs/secrets-encryption.md.
    - secretKey: SECRETS_KEY
      remoteRef:
        key: "nookos/control-plane"
        property: "secrets_key"
