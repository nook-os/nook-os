# HashiCorp Vault as an External Secrets Operator (ESO) source.
#
# This SecretStore tells ESO how to reach your Vault and authenticate. NookOS
# does not talk to Vault — ESO reads Vault and writes a plain Kubernetes Secret,
# which is the only thing the chart consumes (values.existingSecret).
#
# Prerequisites (yours to set up — NG-2, not automated here):
#   - the External Secrets Operator installed in the cluster
#   - Vault reachable from the cluster, with a KV v2 mount holding the values
#   - Vault Kubernetes auth configured with a role bound to the ServiceAccount
#     ESO runs as (or the one named below)
#
# Replace every ALL-CAPS placeholder. Values here are placeholders only (AC-4).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: nook-vault
  namespace: NOOK_NAMESPACE # where the chart is installed
spec:
  provider:
    vault:
      # The address you reach Vault at from inside the cluster.
      server: "https://vault.EXAMPLE.internal:8200"
      # KV v2 secrets engine mount path (the default mount is "secret").
      path: "secret"
      version: "v2"
      auth:
        # Vault's Kubernetes auth method: ESO presents its ServiceAccount token
        # and Vault returns a short-lived Vault token. No static credential.
        kubernetes:
          mountPath: "kubernetes" # the auth mount ("vault auth enable kubernetes")
          role: "NOOK_VAULT_ROLE" # the Vault role bound to the SA below
          serviceAccountRef:
            name: "external-secrets" # the SA ESO runs as (adjust to yours)
