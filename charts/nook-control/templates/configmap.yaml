{{- $c := .Values.config -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nook-control.fullname" . }}-config
  labels:
    {{- include "nook-control.labels" . | nindent 4 }}
data:
  # Non-secret control-plane configuration. Secrets are wired separately from
  # existingSecret via secretKeyRef — never here.
  APP_ENV: {{ $c.appEnv | quote }}
  CONTROL_PLANE_BIND: "0.0.0.0:8080"
  NOOK_AGENT_BIND: "0.0.0.0:8081"
  {{- with $c.publicBaseUrl }}
  PUBLIC_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- with $c.webOrigin }}
  WEB_ORIGIN: {{ . | quote }}
  {{- end }}
  {{- with $c.oidc.issuerUrl }}
  OIDC_ISSUER_URL: {{ . | quote }}
  {{- end }}
  {{- with $c.oidc.clientId }}
  OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with $c.oidc.redirectUrl }}
  OIDC_REDIRECT_URL: {{ . | quote }}
  {{- end }}
  {{- with $c.oidc.scopes }}
  OIDC_SCOPES: {{ . | quote }}
  {{- end }}
  {{- with $c.oidc.deviceClientId }}
  OIDC_DEVICE_CLIENT_ID: {{ . | quote }}
  {{- end }}
  NOOK_ARTIFACT_STORE: {{ $c.artifactStore | quote }}
  {{- with $c.s3.bucket }}
  NOOK_S3_BUCKET: {{ . | quote }}
  {{- end }}
  {{- with $c.s3.endpoint }}
  NOOK_S3_ENDPOINT: {{ . | quote }}
  {{- end }}
  {{- with $c.s3.region }}
  NOOK_S3_REGION: {{ . | quote }}
  {{- end }}
  NOOK_S3_PATH_STYLE: {{ $c.s3.pathStyle | quote }}
