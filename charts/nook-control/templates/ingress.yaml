{{- if .Values.ingress.enabled -}}
{{- if not .Values.ingress.host -}}
{{- fail "\n\ningress.host is required when ingress.enabled is true: set --set ingress.host=nook.example.com (or disable with --set ingress.enabled=false)." -}}
{{- end -}}
{{- $webSvc := include "nook-control.componentName" (dict "root" . "component" "web") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nook-control.fullname" . }}
  labels:
    {{- include "nook-control.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Everything fronts web; nginx serves the SPA and proxies /api itself.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $webSvc }}
                port:
                  number: {{ .Values.service.web.port }}
{{- end }}
