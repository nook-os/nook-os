apiVersion: v1
kind: Service
metadata:
  name: {{ include "nook-control.componentName" (dict "root" . "component" "web") }}
  labels:
    {{- include "nook-control.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.web.type }}
  selector:
    {{- include "nook-control.componentSelectorLabels" (dict "root" . "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
